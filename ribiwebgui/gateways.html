          </div>

          <div class="route-persona-card">
            <div class="route-avatar persona-mark"><img src="/assets/rabiroute-persona-mark.svg" alt="Rabi persona" /></div>
            <div>
              <div class="fields route-persona-fields">
                ${roleSelect(index, gateway)}
              </div>
              <div class="section-note" style="margin-top:7px">路由配置只保存接口和运行参数；选中人格后，下方显示该人格的消息模板规则。</div>
              <div class="section-note" style="margin-top:5px;overflow-wrap:anywhere">配置文件：${escapeHtml(routesPath || "data/route/<配置名>/routeConfig.json")}</div>
            </div>
          </div>
        </section>

        ${personaSection}
      `;
    }

    function renderRuntimePanel() {
      const panel = document.getElementById("runtime-panel");
      const gateway = state.gateways[selectedIndex()];
      if (!gateway) {
        panel.innerHTML = `<div class="empty">暂无运行信息</div>`;
        return;
      }

      const runtime = gatewayRuntime(gateway.id);
      const logs = (runtime.log || []).slice(-18).join("\n");
      const running = runtime.running ? "running" : "stopped";
      const gatewayStatus = runtime.gatewayStatus || {};
      const adapterState = gatewayStatus.messageAdapter || {};
      const adapterTypes = gatewayAdapterTypes(gateway);
      const runtimeAdapterTypes = Array.isArray(runtime.messageAdapters) && runtime.messageAdapters.length > 0
        ? runtime.messageAdapters
        : [runtime.messageAdapterType || adapterState.type || "napcat"];
      const adapterPendingRestart = adapterTypes.join(",") !== runtimeAdapterTypes.join(",");
      const adapterMessage = adapterPendingRestart
        ? `当前运行的是 ${runtimeAdapterTypes.map(adapterLabel).join(" + ")}，保存并重启后切换到 ${adapterTypes.map(adapterLabel).join(" + ")}。`
        : adapterState.message || "";
      const napcatState = gatewayStatus.napcat || {};
      const napcatConnected = Boolean(napcatState.connected);
      const napcatHttpError = Boolean(napcatState.loginInfoError);
      const heartbeatState = gatewayStatus.heartbeat || {};
      const adapterClass = adapterTypes.includes("disabled")
        ? "draft"
        : adapterTypes.includes("napcat") && (!napcatConnected || napcatHttpError)
          ? "stopped"
          : "running";
      const adapterText = adapterTypes.includes("disabled")
        ? "已禁用"
        : adapterTypes.includes("napcat") && !napcatConnected && napcatHttpError
          ? "NapCat 异常"
          : adapterTypes.includes("napcat") && !napcatConnected
            ? "WS 未连接"
            : adapterTypes.includes("napcat") && napcatHttpError
              ? "HTTP 异常"
          : "已启用";
      const adapterReasons = adapterConnectionReasons(gateway, runtime, adapterTypes, napcatState, heartbeatState, adapterPendingRestart, runtimeAdapterTypes);
      const agentState = runtime.codexState || {};
      const agentError = agentState.lastNotificationError || "";
      const agentBound = Boolean(agentState.monitorThreadId);
      const agentClass = agentError ? "stopped" : agentBound ? "running" : "draft";
      const agentText = agentError ? "连接异常" : agentBound ? "已连接" : "未绑定";
      const agentReasons = agentConnectionReasons(gateway, agentState, agentError);
      panel.innerHTML = `
        <section class="section">
          <div class="section-head">
            <h2>运行状态</h2>
            <span class="pill ${running}">${runtime.running ? "运行中" : "已停止"}</span>
          </div>
          <div class="metric-row">
            <div class="metric"><b>${adapterTypes.length}</b><span>消息端</span></div>
            <div class="metric"><b>${runtime.pid || "-"}</b><span>PID</span></div>
          </div>
          <div class="top-actions" style="justify-content:flex-start;margin-top:12px">
            <button onclick="actionGateway('${escapeAttr(gateway.id)}', 'start')">启动</button>
            <button onclick="actionGateway('${escapeAttr(gateway.id)}', 'stop')">停止</button>
            <button class="primary" onclick="actionGateway('${escapeAttr(gateway.id)}', 'restart')">重启</button>
            <button class="danger" onclick="removeGateway('${escapeAttr(gateway.id)}')">删除</button>
          </div>
        </section>
        <section class="section">
          <div class="section-head">
            <h2>消息端连接</h2>
            <span class="pill ${adapterClass}">${adapterText}</span>
          </div>
          <div class="section-note" style="overflow-wrap:anywhere">类型：${escapeHtml(adapterTypes.map(adapterLabel).join(" + "))}</div>
          ${adapterMessage ? `<div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">状态：${escapeHtml(adapterMessage)}</div>` : ""}
          ${renderReasonList(adapterReasons)}
          ${adapterTypes.map(type => renderAdapterStatusDetails(gateway, type, napcatState, heartbeatState)).join("")}
        </section>
        <section class="section">
          <div class="section-head">
            <h2>Agent 连接</h2>
            <span class="pill ${agentClass}">${agentText}</span>
          </div>
          <div class="section-note" style="overflow-wrap:anywhere">会话 ID：${escapeHtml(agentState.monitorThreadId || "-")}</div>
          <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">会话线程名：${escapeHtml(agentState.monitorThreadName || gateway.codexThreadName || "-")}</div>
          <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">自动发现：${escapeHtml(agentState.lastAutoDiscoveryAt || "-")}</div>
          <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">最后成功：${escapeHtml(agentState.lastNotificationAt || "-")}</div>
          <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">通知数：${escapeHtml(String(agentState.notificationCount || 0))}</div>
          ${renderReasonList(agentReasons)}
          ${agentError ? `<div class="section-note" style="margin-top:9px;color:var(--red);overflow-wrap:anywhere">最后错误：${escapeHtml(agentError)}</div>` : ""}
          ${agentState.lastNotificationErrorAt ? `<div class="section-note" style="margin-top:5px;overflow-wrap:anywhere">错误时间：${escapeHtml(agentState.lastNotificationErrorAt)}</div>` : ""}
          <div class="section-note" style="margin-top:9px;overflow-wrap:anywhere">来源：${escapeHtml(agentState.monitorThreadSource || "-")}</div>
          <div class="section-note" style="margin-top:9px;overflow-wrap:anywhere">Agent 状态文件：${escapeHtml(agentState.statePath || "-")}</div>
        </section>
        <section class="section">
          <div class="section-head"><h2>日志</h2><span class="section-note">最近 18 行</span></div>
          <pre>${escapeHtml(logs || "暂无日志")}</pre>
        </section>
      `;
    }

    const helpText = {
      id: "Gateway 的唯一 ID，只能使用英文、数字、下划线或短横线。",
      name: "显示名称，只影响管理台上的可读标题。",
      enabled: "是否由 manager 自动启动这条 gateway。",
      messageAdapterType: "选择消息进入 RabiRoute 的适配端。NapCat 当前可用，其他类型先作为框架预留。",
      messageAdapters: "消息进入 RabiRoute 的入口列表。可以添加多个，例如 NapCat 接收实时 QQ 消息，同时用定时触发替代 Agent 心跳任务。",
      gatewayPort: "当前消息端使用的本地监听端口。不同消息端会有不同协议含义。",
      napcatHttpUrl: "NapCat / OneBot HTTP Server 地址，用于主动调用 OneBot API。",
      routeVariableName: "变量名只能使用英文、数字和下划线，并且不能以数字开头。正则里使用 {变量名}。",
      routeVariableValue: "变量值会在匹配正则前按字面量转义，避免昵称里的特殊字符破坏正则。",
      codexThreadName: "Agent 接收 QQ 消息的固定会话线程名。",
      codexCwd: "Agent 处理消息时使用的工作目录。WebUI 里写普通路径，例如 C:/Path/To/Project 或 C:\\Path\\To\\Project；不要写 JSON 里的双反斜杠。",
      rolesDir: "存放角色文件夹的目录。每个角色一个子文件夹，默认读取其中的 persona.md。",
      agentRoleId: "选择这套路由指向的人格。选中后才会显示该角色的人格配置、路由配置和规则。",
      agentAdapters: "Agent 端适配器配置。当前支持 codexDesktop 和 codexApp。",
      dataDir: "基础数据目录。未选择角色时日志写在这里；选择角色后日志写入角色目录。",
      ruleName: "规则名称，只用于管理台展示。",
      ruleEnabled: "关闭后这条规则会被跳过。",
      ruleRouteKinds: "路由类型由已启用的消息适配端动态提供。NapCat 提供群聊/私聊，定时触发提供 heartbeat。",
      ruleTargetGroupId: "勾选任意群聊路由后可填写；只让这条规则响应某个群时填写群号，留空表示不限群。",
      ruleRegex: "可选的通用消息内容过滤；填写后会按正则匹配消息内容，适合让普通群消息或心跳消息按关键词触发，例如 需求|报错|构建失败。",
      ruleTemplate: "命中这条规则时转发给 Agent 的消息模板。"
    };

    function input(index, field, label, value, className = "") {
      return `<label class="${className}"><span class="label-row">${label}${help(helpText[field] || "")}</span><input data-index="${index}" data-field="${field}" value="${escapeAttr(String(value))}"></label>`;
    }

    function select(index, field, label, value, options) {
      const stringValue = String(value);
      const knownValues = new Set(options.map(option => String(option.value)));
      const allOptions = knownValues.has(stringValue) || !stringValue
        ? options
        : [{ label: `当前配置 (${stringValue})`, value: stringValue }, ...options];
      const optionHtml = allOptions.length
        ? allOptions.map(option => `<option value="${escapeAttr(String(option.value))}" ${String(option.value) === stringValue ? "selected" : ""}>${escapeHtml(option.label)}</option>`).join("")
        : `<option value="${escapeAttr(stringValue)}">${escapeHtml(stringValue || "未读取到选项")}</option>`;
      return `<label><span class="label-row">${label}${help(helpText[field] || "")}</span><select data-index="${index}" data-field="${field}">${optionHtml}</select></label>`;
    }

    function codexCwdOptions(currentValue) {
      const values = new Set();
      if (currentValue) values.add(String(currentValue));
      state.gateways.forEach(gateway => {
        if (gateway.codexCwd) values.add(String(gateway.codexCwd));
      });
      values.delete("C:\\\\Path\\\\To\\\\Your\\\\Project");
      values.delete("C:\\Path\\To\\Your\\Project");
      values.delete("C:/Path/To/Your/Project");
      return [...values].map(value => ({ label: value, value }));
    }

    function codexCwdField(index, gateway) {
      const value = gateway.codexCwd || "";
      const options = codexCwdOptions(value);
      const optionHtml = [
        `<option value="">选择已配置目录</option>`,
        ...options.map(option => `<option value="${escapeAttr(option.value)}" ${option.value === value ? "selected" : ""}>${escapeHtml(option.label)}</option>`)
      ].join("");
      return `
        <label class="field-wide combo-field">
          <span class="label-row">Agent 工作目录${help(helpText.codexCwd || "")}</span>
          <span class="combo-control">
            <select data-index="${index}" data-field="codexCwd">${optionHtml}</select>
            <input data-index="${index}" data-field="codexCwd" value="${escapeAttr(value)}" placeholder="C:/Path/To/Your/Project">
          </span>
        </label>
      `;
    }

    function roleOptionsForGateway(gateway) {
      const runtime = gatewayRuntime(gateway.id);
      const roleInfo = runtime.roleInfo || {};
      return [{ label: "不注入人格", value: "" }, ...((roleInfo.options || []).map(role => ({
        label: role.label || role.value,
        value: role.value
      })))];
    }

    function roleSelect(index, gateway) {
      return select(index, "agentRoleId", "指向人格", gateway.agentRoleId || "", roleOptionsForGateway(gateway));
    }

    function gatewayAdapterTypes(gateway) {
      const adapters = Array.isArray(gateway.messageAdapters) && gateway.messageAdapters.length > 0
        ? gateway.messageAdapters
        : [gateway.messageAdapterType || "napcat"];
      if (adapters.includes("disabled")) return ["disabled"];
      return [...new Set(adapters)].filter(type => type && type !== "disabled");
    }

    function messageAdapterOptions() {
      return [
        { label: "NapCat / OneBot", value: "napcat" },
        { label: "定时触发", value: "heartbeat" },
        { label: "Webhook", value: "webhook" },
        { label: "禁用消息端", value: "disabled" }
      ];
    }

    function adapterTypeSelect(index, adapterIndex, value) {
      const options = messageAdapterOptions();
      const optionHtml = options.map(option => `<option value="${escapeAttr(option.value)}" ${option.value === value ? "selected" : ""}>${escapeHtml(option.label)}</option>`).join("");
      return `
        <label>
          <span class="label-row">消息适配器${help(helpText.messageAdapters)}</span>
          <select data-index="${index}" data-adapter-index="${adapterIndex}" data-adapter-field="type">${optionHtml}</select>
        </label>
      `;
    }

    function messageAdapterSelect(index, gateway) {
      const adapters = gatewayAdapterTypes(gateway);
      const choices = [
        { type: "napcat", title: "NapCat / OneBot", note: "接收 QQ 群聊和私聊实时消息" },
        { type: "heartbeat", title: "定时触发", note: "按间隔主动生成内部消息" },
        { type: "webhook", title: "Webhook", note: "接收外部系统 POST 事件" },
        { type: "disabled", title: "禁用消息端", note: "保留配置但不接收消息" }
      ];
      return `
        <div class="adapter-choice-grid">
          ${choices.map(choice => `
            <button type="button" class="adapter-choice ${adapters.includes(choice.type) ? "active" : ""}" data-index="${index}" data-adapter-toggle="${choice.type}">
              <strong>${escapeHtml(choice.title)}</strong>
              <span>${escapeHtml(choice.note)}</span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderMessageSourcePanel(index, gateway) {
      const adapters = gatewayAdapterTypes(gateway);
      const activeText = adapters.includes("disabled")
        ? "已禁用"
        : adapters.map(adapterLabel).join(" + ");
      return `
        <div class="message-source-panel">
          <div class="message-source-list">
            ${messageAdapterSelect(index, gateway)}
          </div>
          <div class="message-source-fields">
            <div class="message-source-summary">
              <strong>当前消息入口</strong>
              <span>${escapeHtml(activeText)}</span>
            </div>
            ${renderMessageAdapterFields(index, gateway)}
          </div>
        </div>
      `;
    }

    function adapterLabel(type) {
      if (type === "napcat") return "NapCat / OneBot";
      if (type === "heartbeat") return "定时触发";
      if (type === "webhook") return "Webhook";
      if (type === "disabled") return "禁用消息端";
      return type || "未知消息端";
    }

    function adapterOptions(type) {
      const adapters = networkOptions.adapters || {};
      if (type === "napcat") {
        return {
          httpServers: adapters.napcat?.httpServers || networkOptions.httpServers || [],
          websocketClients: adapters.napcat?.websocketClients || networkOptions.websocketClients || []
        };
      }
      if (type === "webhook") {
        return {
          listeners: adapters.webhook?.listeners || []
        };
      }
      if (type === "heartbeat") {
        return {};
      }
      return {};
    }

    function renderMessageAdapterFields(index, gateway) {
      const types = gatewayAdapterTypes(gateway);
      if (types.includes("disabled")) {
        return `<div class="empty" style="padding:18px;text-align:left">当前路由不接收任何消息入口。</div>`;
      }

      return types.map(type => {
        const options = adapterOptions(type);
        if (type === "napcat") {
          return `
            <div class="adapter-fieldset">
              <div class="section-note">NapCat / OneBot：QQ 实时消息入口</div>
              ${select(index, "gatewayPort", "NapCat WS", gateway.gatewayPort || "", options.websocketClients || [])}
              ${select(index, "napcatHttpUrl", "NapCat HTTP", gateway.napcatHttpUrl || "http://127.0.0.1:3000", options.httpServers || [])}
            </div>
          `;
        }
        if (type === "heartbeat") {
          return `
            <div class="adapter-fieldset">
              <div class="section-note">定时触发：不依赖 QQ/NapCat，到点后直接命中心跳路由并发送给 Agent。</div>
              <label><span class="label-row">触发间隔（秒）${help("多久触发一次心跳路由。比如 900 表示每 15 分钟。")}</span><input type="number" min="1" step="1" data-index="${index}" data-field="heartbeatIntervalSeconds" value="${escapeAttr(gateway.heartbeatIntervalSeconds || 900)}"></label>
              <label class="field-wide"><span class="label-row">触发消息${help("这句话会作为心跳路由的 message 变量发给 Agent。")}</span><textarea spellcheck="false" data-index="${index}" data-field="heartbeatMessage">${escapeHtml(gateway.heartbeatMessage || defaultHeartbeatMessage())}</textarea></label>
            </div>
          `;
        }
        if (type === "webhook") {
          const listeners = options.listeners || [];
          return `
            <div class="adapter-fieldset">
              <div class="section-note">Webhook：接收外部系统 POST 事件，并命中预留路由。</div>
              ${select(index, "webhookPort", "Webhook 端口", gateway.webhookPort || gateway.gatewayPort || "", listeners)}
              <label><span class="label-row">Webhook 路径${help("Webhook URL 末尾路径。默认 /webhook。")}</span><input data-index="${index}" data-field="webhookPath" value="${escapeAttr(gateway.webhookPath || "/webhook")}"></label>
            </div>
          `;
        }
        return "";
      }).join("");
    }

    function renderAdapterStatusDetails(gateway, adapterType, napcatState, heartbeatState = {}) {
      if (adapterType !== "napcat") {
        if (adapterType === "heartbeat") {
          return `
            <div class="section-note" style="margin-top:12px;color:var(--navy)">定时触发</div>
            <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">间隔：${escapeHtml(String(gateway.heartbeatIntervalSeconds || heartbeatState.intervalSeconds || 900))} 秒</div>
            <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">最后触发：${escapeHtml(heartbeatState.lastTickAt || "-")}</div>
            <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">触发次数：${escapeHtml(String(heartbeatState.tickCount || 0))}</div>
            <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">说明：定时触发会直接命中 heartbeat 路由并发送给 Agent。</div>
          `;
        }
        if (adapterType === "webhook") {
          return `
            <div class="section-note" style="margin-top:12px;color:var(--navy)">Webhook</div>
            <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">监听：${escapeHtml(String(gateway.webhookPort || gateway.gatewayPort || "-"))}${escapeHtml(gateway.webhookPath || "/webhook")}</div>
            <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">说明：接收 Webhook 事件。</div>
          `;
        }
        return `<div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">说明：消息端已禁用。</div>`;
      }
      const wsUrl = `ws://127.0.0.1:${gateway.gatewayPort || "-"}`;
      const httpUrl = gateway.napcatHttpUrl || "http://127.0.0.1:3000";
      const napcatDiagnosis = [
        napcatState.connected
          ? `WS 已连接：${napcatState.remoteAddress || "远端未知"}`
          : `WS 未连接：请检查 NapCat WebSocket Client 是否连接到 ${wsUrl}`,
        napcatState.loginInfoError
          ? `HTTP 异常：${napcatState.loginInfoError}，请检查 NapCat HTTP Server 是否运行在 ${httpUrl}`
          : napcatState.lastLoginInfoAt
            ? `HTTP 正常：资料刷新 ${napcatState.lastLoginInfoAt}`
            : `HTTP 未验证：尚未成功读取登录资料，当前地址 ${httpUrl}`
      ];
      return `
        <div class="section-note" style="margin-top:12px;color:var(--navy)">NapCat / OneBot</div>
        <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">HTTP: ${escapeHtml(httpUrl)}</div>
        <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">WS: ${escapeHtml(wsUrl)}</div>
        <div class="section-note" style="margin-top:9px;color:${napcatState.connected && !napcatState.loginInfoError ? "var(--green)" : "var(--red)"};overflow-wrap:anywhere">
          ${napcatDiagnosis.map(item => `<div>诊断：${escapeHtml(item)}</div>`).join("")}
        </div>
        <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">远端：${escapeHtml(napcatState.remoteAddress || "-")}</div>
        <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">最后连接：${escapeHtml(napcatState.lastConnectedAt || "-")}</div>
        <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">最后断开：${escapeHtml(napcatState.lastDisconnectedAt || "-")}</div>
        <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">最后消息：${escapeHtml(napcatState.lastMessageAt || "-")}</div>
        <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">消息数：${escapeHtml(String(napcatState.messageCount || 0))}</div>
        <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">机器人：${escapeHtml(napcatState.botNickname || "-")}${napcatState.botUserId ? ` (${escapeHtml(napcatState.botUserId)})` : ""}</div>
        <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">资料刷新：${escapeHtml(napcatState.lastLoginInfoAt || "-")}</div>
        ${napcatState.loginInfoError ? `<div class="section-note" style="margin-top:9px;color:var(--red);overflow-wrap:anywhere">资料读取失败：${escapeHtml(napcatState.loginInfoError)}</div>` : ""}
      `;
    }

    function applyAdapterDefaults(gateway) {
      const types = gatewayAdapterTypes(gateway);
      if (types.includes("napcat")) {
        const options = adapterOptions("napcat");
        const ws = options.websocketClients || [];
        const http = options.httpServers || [];
        if (ws.length > 0 && !ws.some(option => String(option.value) === String(gateway.gatewayPort))) {
          gateway.gatewayPort = Number(ws[0].value);
        }
        if (http.length > 0 && !http.some(option => String(option.value) === String(gateway.napcatHttpUrl))) {
          gateway.napcatHttpUrl = http[0].value;
        }
      }
      if (types.includes("webhook")) {
        const listeners = adapterOptions("webhook").listeners || [];
        if (gateway.webhookPort == null) {
          gateway.webhookPort = gateway.gatewayPort;
        }
        if (listeners.length > 0 && !listeners.some(option => String(option.value) === String(gateway.webhookPort))) {
          gateway.webhookPort = Number(listeners[0].value);
        }
        gateway.webhookPath = gateway.webhookPath || "/webhook";
      }
      if (types.includes("heartbeat")) {
        gateway.heartbeatIntervalSeconds = Number(gateway.heartbeatIntervalSeconds || 900);
        gateway.heartbeatMessage = gateway.heartbeatMessage || defaultHeartbeatMessage();
      }
      gateway.messageAdapterType = types[0] || "napcat";
      gateway.messageAdapters = types.length > 0 ? types : ["napcat"];
    }

    function agentConfigSelect(index, gateway) {
      const adapters = Array.isArray(gateway.agentAdapters) ? gateway.agentAdapters : ["codexDesktop"];
      const selected = adapters[0] || "codexDesktop";
      return select(index, "agentAdapters", "Agent 配置", selected, [
        { label: "CodexDesktop", value: "codexDesktop" },
        { label: "CodexApp", value: "codexApp" }
      ]);
    }

    function renderRolePreview(gateway, roleId) {
      const runtime = gatewayRuntime(gateway.id);
      const roleInfo = runtime.roleInfo || {};
      if (!roleId) {
        return `<div class="empty">未选择角色，发送时不会注入人格提示词。</div>`;
      }
      const role = (roleInfo.options || []).find(item => item.value === roleId) || {};
      const roleError = role.roleError || (roleId === roleInfo.selectedRoleId ? roleInfo.selectedRoleError : "");
      if (roleError) {
        return `<div class="empty">读取角色文件失败：${escapeHtml(roleError)}</div>`;
      }
      const content = role.roleContent || (roleId === roleInfo.selectedRoleId ? roleInfo.selectedRoleContent : "");
      if (!content.trim()) {
        return `<div class="empty">角色文件为空或尚未刷新。</div>`;
      }
      const rolePath = role.rolePath || (roleId === roleInfo.selectedRoleId ? roleInfo.selectedRolePath : "");
      return `
        <div class="section-note" style="overflow-wrap:anywhere">文件：${escapeHtml(rolePath || "")}</div>
        <pre style="min-height:160px;max-height:360px;margin-top:8px">${escapeHtml(content)}</pre>
      `;
    }

    function routeConfigPathFor(gateway) {
      return `./data/route/${configNameFor(gateway)}/routeConfig.json`;
    }

    function configNameFor(gateway) {
      if (gateway.configName) return gateway.configName;
      const parts = String(gateway.id || "").split("__");
      return parts.length > 1 ? parts.slice(1).join("__") : "default";
    }

    function roleMessageDataDirFor(gateway) {
      return `./data/route/${configNameFor(gateway)}`;
    }

    async function openConfigFile(type, gatewayId = "", roleId = "") {
      try {
        const params = new URLSearchParams({ type });
        if (gatewayId) params.set("gatewayId", gatewayId);
        if (roleId) params.set("roleId", roleId);
        const response = await fetch(`${apiBase}/open-config-file?${params.toString()}`, { method: "POST" });
        const text = await response.text();
        let body;
        try {
          body = text ? JSON.parse(text) : {};
        } catch {
          const preview = text.replace(/\s+/g, " ").slice(0, 120);
          throw new Error(`打开配置文件接口没有返回 JSON，可能是 manager 尚未重启或请求路径不对。响应：${preview}`);
        }
        if (!response.ok || body.code !== 0) {
          throw new Error(body.message || body.error || "打开配置文件失败");
        }
        return body.data;
      } catch (error) {
        alert(error instanceof Error ? error.message : String(error));
        return null;
      }
    }

    function renderTemplateVars() {
      return templateVars.map(item => `
        <div class="template-var">
          <code>{${escapeHtml(item.name)}}</code>
          <span>${escapeHtml(item.description)}</span>
        </div>
      `).join("");
    }

    function routeKindDefinitionsForGateway(gateway) {
      const adapters = gatewayAdapterTypes(gateway);
      const definitions = [];
      if (adapters.includes("napcat")) {
        definitions.push({
          adapter: "napcat",
          title: "NapCat / OneBot",
          note: "QQ 实时消息",
          groups: [
            {
              title: "群聊事件",
              routeKinds: ["direct_at", "direct_reply", "indirect_reply", "group_message"]
            },
            {
              title: "私聊事件",
              routeKinds: ["private"]
            }
          ]
        });
      }
      if (adapters.includes("heartbeat")) {
        definitions.push({
          adapter: "heartbeat",
          title: "定时触发",
          note: "内部心跳消息",
          groups: [
            {
              title: "定时事件",
              routeKinds: ["heartbeat"]
            }
          ]
        });
      }
      if (adapters.includes("webhook")) {
        definitions.push({
          adapter: "webhook",
          title: "Webhook",
          note: "外部系统消息",
          groups: [
            {
              title: "语音事件",
              routeKinds: ["voice_transcript"]
            }
          ]
        });
      }
      return definitions;
    }

    function isGroupRouteKind(routeKind) {
      return ["direct_at", "direct_reply", "indirect_reply", "group_message"].includes(routeKind);
    }

    function ruleHasGroupRoute(rule) {
      return (Array.isArray(rule.routeKinds) ? rule.routeKinds : []).some(isGroupRouteKind);
    }

    function renderRouteKindPanels(index, ruleIndex, safeRule, gateway) {
      const definitions = routeKindDefinitionsForGateway(gateway);
      if (definitions.length === 0 || gatewayAdapterTypes(gateway).includes("disabled")) {
        return `<div class="empty" style="padding:10px;text-align:left">当前没有启用可提供路由类型的消息适配器。</div>`;
      }
      return `
        <div class="route-source-list">
          ${definitions.map(definition => `
            <div class="route-source-card">
              <div class="route-source-head">
                <span>${escapeHtml(definition.title)}</span>
                <span>${escapeHtml(definition.note)}</span>
              </div>
              ${definition.groups.length > 0 ? definition.groups.map(group => `
                <div class="route-kind-group">
                  <div class="route-kind-group-title">${escapeHtml(group.title)}</div>
                  <div class="route-kind-chip-list">
                    ${group.routeKinds.map(value => `
                      <label><input type="checkbox" data-index="${index}" data-rule-index="${ruleIndex}" data-route-kind="${value}" ${safeRule.routeKinds.includes(value) ? "checked" : ""}>${escapeHtml(routeKindLabels[value] || value)}</label>
                    `).join("")}
                  </div>
                  ${group.routeKinds.some(isGroupRouteKind) && ruleHasGroupRoute(safeRule) ? `
                    <div class="route-group-filter">
                      <label><span class="label-row">目标群号${help(helpText.ruleTargetGroupId)}</span><input data-index="${index}" data-rule-index="${ruleIndex}" data-rule-field="targetGroupId" value="${escapeAttr(safeRule.targetGroupId || "")}" placeholder="留空=不限群"></label>
                    </div>
                  ` : ""}
                </div>
              `).join("") : `<div class="section-note">这个适配端还没有暴露可配置的路由类型。</div>`}
            </div>
          `).join("")}
        </div>
      `;
    }

    function routeKindSummary(rule) {
      const kinds = Array.isArray(rule.routeKinds) ? rule.routeKinds : [];
      return kinds.length ? kinds.map(kind => routeKindLabels[kind] || kind).join(" / ") : "未选择路由类型";
    }

    function ruleTemplateSnippet(rule) {
      return normalizeTemplateText(rule.template || "").replace(/\s+/g, " ").trim().slice(0, 120) || "暂无模板正文";
    }

    function renderRuleOverview(index, ruleIndex, rule) {
      const safeRule = normalizeRule(rule, ruleIndex);
      const matchText = safeRule.regex ? `匹配：${safeRule.regex}` : "不限关键词";
      return `
        <button type="button" class="rule-overview-card" onclick="openRuleModal(${index}, ${ruleIndex})">
          <span class="rule-overview-main">
            <span class="rule-overview-title">
              <strong>${escapeHtml(safeRule.name)}</strong>
              <span class="rule-chip">${safeRule.enabled !== false ? "启用" : "停用"}</span>
              <span class="rule-chip">${escapeHtml(safeRule.id)}</span>
            </span>
            <span class="rule-overview-meta">
              <span>${escapeHtml(routeKindSummary(safeRule))}</span>
              <span>${escapeHtml(matchText)}</span>
            </span>
            <span class="rule-overview-snippet">${escapeHtml(ruleTemplateSnippet(safeRule))}</span>
          </span>
          <span class="rule-overview-action">编辑</span>
        </button>
      `;
    }

    function renderRule(index, ruleIndex, rule) {
      const gateway = state.gateways[index];
      const safeRule = normalizeRule(rule, ruleIndex);

      return `
        <article class="rule-card">
          <div class="rule-top">
            <div class="rule-title-stack">
              <label><span class="label-row">名称${help(helpText.ruleName)}</span><input data-index="${index}" data-rule-index="${ruleIndex}" data-rule-field="name" value="${escapeAttr(safeRule.name)}"></label>
              <span class="rule-id">${escapeHtml(safeRule.id)}</span>
            </div>
            <label class="inline-check"><input type="checkbox" data-index="${index}" data-rule-index="${ruleIndex}" data-rule-field="enabled" ${safeRule.enabled !== false ? "checked" : ""}>启用</label>
          </div>
          <div class="rule-body">
            <div class="rule-tools">
              <div class="route-kind-box">
                <span class="label-row">路由类型${help(helpText.ruleRouteKinds)}</span>
                ${renderRouteKindPanels(index, ruleIndex, safeRule, gateway)}
              </div>
              <div class="route-filter-card">
                <label><span class="label-row">消息匹配${help(helpText.ruleRegex)}</span><input data-index="${index}" data-rule-index="${ruleIndex}" data-rule-field="regex" value="${escapeAttr(safeRule.regex || "")}" placeholder="例如：需求|报错|构建失败"></label>
                <div class="section-note rule-note">消息匹配是所有路由类型的通用过滤；留空时只看路由类型。间接回复会同时匹配被回复消息。</div>
              </div>
              <button type="button" class="danger" onclick="removeNotificationRule(${index}, ${ruleIndex})">删除规则</button>
            </div>
            <label class="template-editor"><span class="label-row">Agent 消息包装模板${help(helpText.ruleTemplate)}</span><textarea spellcheck="false" data-index="${index}" data-rule-index="${ruleIndex}" data-rule-field="template">${escapeHtml(String(safeRule.template))}</textarea></label>
          </div>
        </article>
      `;
    }

    function renderRuleModal() {
      const root = document.getElementById("modal-root");
      if (!ruleModalState) {
        root.innerHTML = "";
        return;
      }
      const index = ruleModalState.gatewayIndex;
      const gateway = state.gateways[index];
      if (!gateway) {
        ruleModalState = null;
        root.innerHTML = "";
        return;
      }
      const rules = notificationRulesForGateway(gateway);
      if (rules.length === 0) {
        root.innerHTML = "";
        ruleModalState = null;
        return;
      }
      const activeRuleIndex = Math.max(0, Math.min(ruleModalState.ruleIndex, rules.length - 1));
      ruleModalState.ruleIndex = activeRuleIndex;
      root.innerHTML = `
        <div class="modal-backdrop" role="dialog" aria-modal="true" data-modal-backdrop="rule">
          <div class="modal">
            <div class="modal-head">
              <div>
                <h2>规则设置</h2>
                <div class="section-note">${escapeHtml(gateway.agentRoleId || "未指向人格")} · ${rules.length} 条消息模板规则</div>
              </div>
              <div class="top-actions">
                <button type="button" class="accent" onclick="addNotificationRule(${index})">新增规则</button>
                <button type="button" onclick="closeRuleModal()">关闭</button>
              </div>
            </div>
            <div class="modal-body">
              <div class="rule-tabs">
                ${rules.map((rule, ruleIndex) => {
                  const safeRule = normalizeRule(rule, ruleIndex);
                  return `
                    <button type="button" class="rule-tab ${ruleIndex === activeRuleIndex ? "active" : ""}" onclick="selectRuleTab(${ruleIndex})">
                      <span class="rule-overview-main">
                        <span class="rule-overview-title"><strong>${escapeHtml(safeRule.name)}</strong></span>
                        <span class="rule-overview-meta">${escapeHtml(routeKindSummary(safeRule))}</span>
                      </span>
                    </button>
                  `;
                }).join("")}
              </div>
              <div class="rule-editor-pane">
                ${renderRule(index, activeRuleIndex, rules[activeRuleIndex])}
              </div>
            </div>
          </div>
        </div>
      `;
      bindInputs();
    }

    function openRuleModal(index, ruleIndex = 0) {
      ruleModalState = { gatewayIndex: index, ruleIndex };
      renderRuleModal();
    }

    function closeRuleModal() {
      ruleModalState = null;
      renderRuleModal();
    }

    function selectRuleTab(ruleIndex) {
      if (!ruleModalState) return;
      ruleModalState.ruleIndex = ruleIndex;
      renderRuleModal();
    }

    function notificationRulesForGateway(gateway) {
      ensureActiveRoleRules(gateway);
      if (!Array.isArray(gateway.notificationRules)) {
        gateway.notificationRules = [];
      }
      return gateway.notificationRules;
    }

    function normalizeTemplateText(value) {
      return String(value || "")
        .replace(/\\r\\n/g, "\n")
        .replace(/\\n/g, "\n");
    }

    function cloneRules(rules) {
      return JSON.parse(JSON.stringify(Array.isArray(rules) ? rules : [])).map((rule, index) => normalizeRule(rule, index));
    }

    function normalizeGatewayTemplates(gateway) {
      const agentAdapters = Array.isArray(gateway.agentAdapters) ? gateway.agentAdapters : ["codexDesktop"];
      gateway.agentAdapters = [...new Set(agentAdapters.filter(item => item === "codexDesktop" || item === "codexApp"))];

      [
        "groupNotificationTemplate",
        "groupAtNotificationTemplate",
        "groupDirectReplyNotificationTemplate",
        "groupIndirectReplyNotificationTemplate",
        "groupReplyNotificationTemplate",
        "groupNicknameNotificationTemplate",
        "privateNotificationTemplate",
        "heartbeatNotificationTemplate",
        "voiceTranscriptNotificationTemplate"
      ].forEach(field => {
        if (typeof gateway[field] === "string") gateway[field] = normalizeTemplateText(gateway[field]);
      });

      if (Array.isArray(gateway.notificationRules)) {
        gateway.notificationRules = gateway.notificationRules.map((rule, index) => normalizeRule(rule, index));
      }
      if (gateway.roleNotificationRules && typeof gateway.roleNotificationRules === "object" && !Array.isArray(gateway.roleNotificationRules)) {
        Object.keys(gateway.roleNotificationRules).forEach(roleId => {
          if (Array.isArray(gateway.roleNotificationRules[roleId])) {
            gateway.roleNotificationRules[roleId] = gateway.roleNotificationRules[roleId].map((rule, index) => normalizeRule(rule, index));
          }
        });
      }
    }

    function normalizeStateTemplates() {
      state.gateways.forEach(normalizeGatewayTemplates);
    }

    function activeRoleKey(gateway) {
      return gateway.id || "";
    }

    function ensureRoleRuleStore(gateway) {
      if (!gateway.roleNotificationRules || typeof gateway.roleNotificationRules !== "object" || Array.isArray(gateway.roleNotificationRules)) {
        gateway.roleNotificationRules = {};
      }
      return gateway.roleNotificationRules;
    }

    function ensureActiveRoleRules(gateway) {
      const roleKey = activeRoleKey(gateway);
      const store = ensureRoleRuleStore(gateway);
      if (roleKey && Array.isArray(store[roleKey])) {
        gateway.notificationRules = cloneRules(store[roleKey]);
      } else if (roleKey) {
        const currentRules = Array.isArray(gateway.notificationRules) ? gateway.notificationRules : [];
        store[roleKey] = cloneRules(currentRules);
        gateway.notificationRules = cloneRules(currentRules);
      }
    }

    function switchGatewayRole(index, nextRoleId) {
      const gateway = state.gateways[index];
      gateway.agentRoleId = nextRoleId;
      render();
    }

    function ensureRouteVariables(gateway) {
      if (!gateway.routeVariables || typeof gateway.routeVariables !== "object" || Array.isArray(gateway.routeVariables)) {
        gateway.routeVariables = {};
      }
      return gateway.routeVariables;
    }

    function renderRouteVariables(index, gateway) {
      const entries = Object.entries(ensureRouteVariables(gateway));
      if (entries.length === 0) {
        return `<div class="empty">暂无自定义路由变量</div>`;
      }
      return entries.map(([key, value]) => `
        <div class="variable-row">
          <label><span class="label-row">变量名${help(helpText.routeVariableName)}</span><input data-index="${index}" data-variable-field="key" data-variable-key="${escapeAttr(key)}" value="${escapeAttr(key)}"></label>
          <label><span class="label-row">变量值${help(helpText.routeVariableValue)}</span><input data-index="${index}" data-variable-field="value" data-variable-key="${escapeAttr(key)}" value="${escapeAttr(String(value))}"></label>
          <button type="button" class="danger" onclick="removeRouteVariable(${index}, '${escapeAttr(key)}')">删除</button>
        </div>
      `).join("");
    }

    function normalizeRule(rule, index) {
      return {
        id: rule.id || `rule-${index + 1}`,
        name: rule.name || rule.id || `规则 ${index + 1}`,
        enabled: rule.enabled !== false,
        routeKinds: Array.isArray(rule.routeKinds) ? rule.routeKinds : [],
        targetGroupId: rule.targetGroupId || "",
        regex: rule.regex || "",
        template: normalizeTemplateText(rule.template || defaultGroupAtTemplate())
      };
    }

    function escapeRegex(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function groupTemplate(title) {
      return [
        `QQ 消息更新提醒：${title}。`,
        "时间：{time}",
        "目标：{messageTarget}",
        "群号：{groupId}",
        "发送者：{sender}",
        "消息：{message}",
        "",
        "请在需要时读取 {groupLogPath} 查看上下文。"
      ].join("\n");
    }
    function defaultGroupAtTemplate() { return groupTemplate("群聊里有人 @ 了机器人"); }
    function defaultGroupDirectReplyTemplate() { return groupTemplate("群聊里有人直接回复机器人"); }
    function defaultGroupIndirectReplyTemplate() {
      return [
        "QQ 消息更新提醒：群聊里有人回复了一条提到机器人的消息。",
        "时间：{time}",
        "目标：{messageTarget}",
        "群号：{groupId}",
        "发送者：{sender}",
        "被回复消息：{repliedMessage}",
        "消息：{message}",
        "",
        "请在需要时读取 {groupLogPath} 查看上下文。"
      ].join("\n");
    }
    function defaultPrivateTemplate() {
      return [
        "QQ 消息更新提醒：收到一条私聊消息。",
        "时间：{time}",
        "目标：{messageTarget}",
        "发送者：{sender}",
        "QQ：{userId}",
        "消息：{message}",
        "",
        "请在需要时读取 {privateLogPath} 查看上下文。"
      ].join("\n");
    }
    function defaultHeartbeatMessage() {
      return "定时心跳巡检：请检查最近消息和角色相关上下文。";
    }
    function defaultHeartbeatTemplate() {
      return [
        "定时触发提醒：到了心跳路由时间。",
        "时间：{time}",
        "来源：{messageTarget}",
        "间隔：{heartbeatIntervalSeconds} 秒",
        "消息：{message}",
        "",
        "请读取 {dataDir} 下的消息日志和角色相关上下文，按当前人格判断是否需要回应、记录、追问或保持安静。"
      ].join("\n");
    }
    function defaultVoiceTranscriptTemplate() {
      return [
        "语音转写更新提醒：FenneNote 捕获到一段来自电脑旁用户的语音输入。",
        "时间：{time}",
        "来源：{messageTarget}",
        "转写：{message}",
        "时长：{voiceDurationSeconds} 秒",
        "峰值：{voicePeak}",
        "",
        "请直接在当前 Codex 会话里回复用户；不要生成 QQ 可发送回复，不要转交到 QQ/NapCat，也不要尝试通过 QQ 发送消息。需要上下文时再读取 {voiceTranscriptLogPath}。"
      ].join("\n");
    }

    function bindInputs() {
      document.querySelectorAll("[data-select-gateway]").forEach(element => {
        element.addEventListener("click", () => {
          selectedGatewayId = element.dataset.selectGateway;
          render();
        });
      });
      document.querySelectorAll("[data-field]").forEach(element => {
        element.addEventListener("input", updateValue);
        element.addEventListener("change", updateValue);
      });
      document.querySelectorAll("[data-rule-field]").forEach(element => {
        element.addEventListener("input", updateRuleValue);
        element.addEventListener("change", updateRuleValue);
      });
      document.querySelectorAll(".template-editor textarea").forEach(element => {
        autoSizeTemplateTextarea(element);
      });
      document.querySelectorAll("[data-route-kind]").forEach(element => {
        element.addEventListener("change", updateRuleKinds);
      });
      document.querySelectorAll("[data-variable-field]").forEach(element => {
        element.addEventListener("input", updateRouteVariable);
        element.addEventListener("change", updateRouteVariable);
      });
      document.querySelectorAll("[data-adapter-field]").forEach(element => {
        element.addEventListener("change", updateMessageAdapterRow);
      });
      document.querySelectorAll("[data-adapter-toggle]").forEach(element => {
        element.addEventListener("click", updateMessageAdapterToggle);
      });
      document.querySelectorAll(".help").forEach(element => {
        element.addEventListener("mouseenter", () => showTooltip(element));
        element.addEventListener("mouseleave", () => {
          if (!element.classList.contains("active")) hideTooltip();
        });
        element.addEventListener("focus", () => showTooltip(element));
        element.addEventListener("blur", () => {
          if (!element.classList.contains("active")) hideTooltip();
        });
        element.addEventListener("click", event => {
          event.stopPropagation();
          document.querySelectorAll(".help.active").forEach(active => {
            if (active !== element) active.classList.remove("active");
          });
          element.classList.toggle("active");
          if (element.classList.contains("active")) showTooltip(element); else hideTooltip();
        });
      });
    }

    function updateValue(event) {
      const index = Number(event.target.dataset.index);
      const field = event.target.dataset.field;
      let value = event.target.type === "checkbox" ? event.target.checked : event.target.value;
      if (field === "gatewayPort" || field === "webhookPort") value = Number(value);
      if (field === "agentAdapters") value = String(value).trim() ? [String(value).trim()] : [];
      if (field === "agentRoleId") {
        switchGatewayRole(index, String(value));
        return;
      }
      if (field === "messageAdapterType") {
        state.gateways[index].messageAdapterType = String(value);
        state.gateways[index].messageAdapters = [String(value)];
        applyAdapterDefaults(state.gateways[index]);
        render();
        return;
      }
      if (field === "heartbeatIntervalSeconds") value = Number(value);
      state.gateways[index][field] = value;
      if (field === "codexCwd") {
        document.querySelectorAll(`[data-index="${index}"][data-field="codexCwd"]`).forEach(element => {
          if (element !== event.target && element.value !== value) element.value = value;
        });
      }
      if (field === "id") selectedGatewayId = value;
      renderGatewayList();
      renderRuntimePanel();
    }

    function updateMessageAdapterRow(event) {
      const index = Number(event.target.dataset.index);
      const adapterIndex = Number(event.target.dataset.adapterIndex);
      const gateway = state.gateways[index];
      const adapters = gatewayAdapterTypes(gateway);
      adapters[adapterIndex] = String(event.target.value);
      setGatewayAdapters(gateway, adapters);
      applyAdapterDefaults(gateway);
      render();
    }

    function updateMessageAdapterToggle(event) {
      const index = Number(event.currentTarget.dataset.index);
      const type = String(event.currentTarget.dataset.adapterToggle || "");
      const gateway = state.gateways[index];
      const adapters = new Set(gatewayAdapterTypes(gateway));
      if (type === "disabled") {
        setGatewayAdapters(gateway, adapters.has("disabled") ? ["napcat"] : ["disabled"]);
      } else {
        adapters.delete("disabled");
        if (adapters.has(type)) {
          adapters.delete(type);
        } else {
          adapters.add(type);
        }
        setGatewayAdapters(gateway, [...adapters]);
      }
      applyAdapterDefaults(gateway);
      render();
    }

    function setGatewayAdapters(gateway, adapters) {
      let next = adapters.filter(Boolean);
      if (next.includes("disabled")) {
        next = ["disabled"];
      } else {
        next = [...new Set(next)].filter(type => type !== "disabled");
      }
      if (next.length === 0) next = ["napcat"];
      gateway.messageAdapters = next;
      gateway.messageAdapterType = next[0];
    }

    function updateRuleValue(event) {
      const index = Number(event.target.dataset.index);
      const ruleIndex = Number(event.target.dataset.ruleIndex);
      const field = event.target.dataset.ruleField;
      const rules = notificationRulesForGateway(state.gateways[index]);
      let value = event.target.type === "checkbox" ? event.target.checked : event.target.value;
      if (field === "template") {
        value = normalizeTemplateText(value);
        if (event.target.value !== value) event.target.value = value;
      }
      rules[ruleIndex][field] = value;
      const roleKey = activeRoleKey(state.gateways[index]);
      if (roleKey) {
        ensureRoleRuleStore(state.gateways[index])[roleKey] = cloneRules(rules);
      }
      if (field === "template") {
        autoSizeTemplateTextarea(event.target);
      }
    }

    function autoSizeTemplateTextarea(element) {
      element.style.height = "auto";
      const maxHeight = 520;
      const ruleBody = element.closest(".rule-body");
      const toolsHeight = ruleBody ? ruleBody.querySelector(".rule-tools")?.scrollHeight || 0 : 0;
      const nextHeight = Math.min(Math.max(element.scrollHeight + 2, toolsHeight, 240), maxHeight);
      element.style.height = `${nextHeight}px`;
    }

    function updateRuleKinds(event) {
      const index = Number(event.target.dataset.index);
      const ruleIndex = Number(event.target.dataset.ruleIndex);
      const routeKind = event.target.dataset.routeKind;
      const rules = notificationRulesForGateway(state.gateways[index]);
      const routeKinds = new Set(Array.isArray(rules[ruleIndex].routeKinds) ? rules[ruleIndex].routeKinds : []);
      if (event.target.checked) {
        routeKinds.add(routeKind);
      } else {
        routeKinds.delete(routeKind);
      }
      rules[ruleIndex].routeKinds = [...routeKinds];
      const roleKey = activeRoleKey(state.gateways[index]);
      if (roleKey) {
        ensureRoleRuleStore(state.gateways[index])[roleKey] = cloneRules(rules);
      }
      ruleModalState = { gatewayIndex: index, ruleIndex: rules.length - 1 };
      render();
    }

    function updateRouteVariable(event) {
      const index = Number(event.target.dataset.index);
      const oldKey = event.target.dataset.variableKey;
      const field = event.target.dataset.variableField;
      const variables = ensureRouteVariables(state.gateways[index]);
      if (field === "value") {
        variables[oldKey] = event.target.value;
        return;
      }

      const nextKey = event.target.value.trim();
      if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(nextKey) || nextKey === oldKey) {
        return;
      }
      variables[nextKey] = variables[oldKey] ?? "";
      delete variables[oldKey];
      render();
    }

    function addRouteVariable(index) {
      const variables = ensureRouteVariables(state.gateways[index]);
      let next = 1;
      while (variables[`Variable${next}`] != null) next += 1;
      variables[`Variable${next}`] = "";
      render();
    }

    function removeRouteVariable(index, key) {
      const variables = ensureRouteVariables(state.gateways[index]);
      delete variables[key];
      render();
    }

    function addNotificationRule(index) {
      const rules = notificationRulesForGateway(state.gateways[index]);
      const next = rules.length + 1;
      rules.push({
        id: `rule-${Date.now().toString(36)}-${next}`,
        name: `规则 ${next}`,
        enabled: true,
        routeKinds: [],
        targetGroupId: "",
        regex: "",
        template: defaultGroupAtTemplate()
      });
      const roleKey = activeRoleKey(state.gateways[index]);
      if (roleKey) {
        ensureRoleRuleStore(state.gateways[index])[roleKey] = cloneRules(rules);
      }
      if (ruleModalState && ruleModalState.gatewayIndex === index) {
        if (rules.length === 0) {
          ruleModalState = null;
        } else {
          ruleModalState.ruleIndex = Math.max(0, Math.min(ruleModalState.ruleIndex, rules.length - 1));
        }
      }
      render();
    }

    function removeNotificationRule(index, ruleIndex) {
      const rules = notificationRulesForGateway(state.gateways[index]);
      rules.splice(ruleIndex, 1);
      const roleKey = activeRoleKey(state.gateways[index]);
      if (roleKey) {
        ensureRoleRuleStore(state.gateways[index])[roleKey] = cloneRules(rules);
      }
      render();
    }

    function addMessageAdapter(index) {
      const gateway = state.gateways[index];
      const adapters = gatewayAdapterTypes(gateway);
      const order = ["napcat", "heartbeat", "webhook"];
      const nextType = order.find(type => !adapters.includes(type)) || "heartbeat";
      setGatewayAdapters(gateway, [...adapters.filter(type => type !== "disabled"), nextType]);
      applyAdapterDefaults(gateway);
      render();
    }

    function removeMessageAdapter(index, adapterIndex) {
      const gateway = state.gateways[index];
      const adapters = gatewayAdapterTypes(gateway);
      adapters.splice(adapterIndex, 1);
      setGatewayAdapters(gateway, adapters);
      applyAdapterDefaults(gateway);
      render();
    }

    function addGateway() {
      const next = state.gateways.length + 1;
      const roleId = "Rabi";
      const configName = `config-${next}`;
      const gateway = {
        id: `${roleId}__${configName}`,
        configName,
        name: `路由配置 ${next}`,
        enabled: true,
        messageAdapterType: "napcat",
        messageAdapters: ["napcat"],
        gatewayPort: 8789 + next,
        napcatHttpUrl: "http://127.0.0.1:3000",
        heartbeatIntervalSeconds: 900,
        heartbeatMessage: defaultHeartbeatMessage(),
        routeVariables: {},
        codexThreadName: `路由配置 ${next}`,
        codexCwd: "",
        rolesDir: "./data/roles",
        agentRoleId: roleId,
        agentRoleFile: "persona.md",
        agentAdapters: ["codexDesktop"],
        dataDir: `./data/route/${configName}`,
        notificationRules: []
      };
      state.gateways.push(gateway);
      selectedGatewayId = gateway.id;
      render();
    }

    function removeGateway(id) {
      state.gateways = state.gateways.filter(gateway => gateway.id !== id);
      if (selectedGatewayId === id) selectedGatewayId = state.gateways[0]?.id || "";
      render();
    }

    async function load() {
      await loadPluginConfig();
      try {
        const networkResponse = await fetch(`${apiBase}/network-options`);
        const networkBody = await networkResponse.json();
        if (networkResponse.ok && networkBody.code === 0 && networkBody.data) {
          networkOptions = {
            adapters: networkBody.data.adapters || {},
            httpServers: networkBody.data.httpServers || [],
            websocketClients: networkBody.data.websocketClients || []
          };
        }
      } catch {
        networkOptions = { adapters: {}, httpServers: [], websocketClients: [] };
      }

      const response = await fetch(`${apiBase}/gateways`);
      const body = await response.json();
      if (!response.ok || body.code !== 0 || !body.data || !body.data.config) {
        throw new Error(body.message || body.error || "插件 API 没有返回 gateway 配置");
      }
      state = body.data.config;
      configFiles = body.data.configFiles || {};
      normalizeStateTemplates();
      managerRows = Array.isArray(body.data.manager) ? body.data.manager : Object.assign([], { error: body.data.manager.error });
      render();
    }

    async function loadPluginConfig() {
      if (!isPluginShell) return;
      try {
        const response = await fetch(`${pluginApiBase}/config`);
        const body = await response.json();
        const managerUrl = body && body.code === 0 && body.data && body.data.managerUrl ? body.data.managerUrl : "http://127.0.0.1:8790";
        document.getElementById("standalone-link").href = managerUrl.replace(/\/$/, "") + "/";
      } catch {
        document.getElementById("standalone-link").href = "http://127.0.0.1:8790/";
      }
    }

    async function save() {
      normalizeStateTemplates();
      const response = await fetch(`${apiBase}/gateways`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(state)
      });
      const body = await response.json();
      if (body.code !== 0) throw new Error(body.message);
      await load();
    }

    async function startManager() {
      await fetch(`${apiBase}/manager/start`, { method: "POST" });
      setTimeout(load, 1200);
    }

    async function actionGateway(id, action) {
      await fetch(`${apiBase}/gateways/${encodeURIComponent(id)}/${action}`, { method: "POST" });
      setTimeout(load, 700);
    }

    function help(text) {
      return `<span class="help" tabindex="0" data-help="${escapeAttr(text)}">?</span>`;
    }

    function showTooltip(anchor) {
      const tooltip = document.getElementById("tooltip");
      tooltip.textContent = anchor.dataset.help || "";
      tooltip.classList.add("visible");
      tooltip.style.transform = "translate3d(0, 0, 0)";
      const anchorRect = anchor.getBoundingClientRect();
      const tooltipRect = tooltip.getBoundingClientRect();
      const margin = 12;
      let left = anchorRect.left + anchorRect.width / 2 - tooltipRect.width / 2;
      left = Math.max(margin, Math.min(left, window.innerWidth - tooltipRect.width - margin));
      let top = anchorRect.top - tooltipRect.height - 8;
      if (top < margin) top = anchorRect.bottom + 8;
      top = Math.max(margin, Math.min(top, window.innerHeight - tooltipRect.height - margin));
      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;
    }

    function hideTooltip() {
      const tooltip = document.getElementById("tooltip");
      tooltip.classList.remove("visible");
      tooltip.style.transform = "translate3d(-9999px, -9999px, 0)";
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }
    function escapeAttr(value) { return escapeHtml(value); }

    document.getElementById("refresh").addEventListener("click", load);
    document.getElementById("save").addEventListener("click", save);
    document.getElementById("add").addEventListener("click", addGateway);
    document.getElementById("open-manager-config").addEventListener("click", () => openConfigFile("manager"));
    document.getElementById("start-manager").addEventListener("click", startManager);
    function syncTopbarHeight() {
      const topbar = document.querySelector(".topbar");
      if (!topbar) return;
      document.documentElement.style.setProperty("--topbar-height", `${Math.ceil(topbar.getBoundingClientRect().height)}px`);
    }
    window.addEventListener("resize", syncTopbarHeight);
    if ("ResizeObserver" in window) {
      new ResizeObserver(syncTopbarHeight).observe(document.querySelector(".topbar"));
    }
    syncTopbarHeight();
    document.addEventListener("click", event => {
      if (event.target.dataset && event.target.dataset.modalBackdrop === "rule") {
        closeRuleModal();
        return;
      }
      if (event.target.closest && event.target.closest(".help")) return;
      document.querySelectorAll(".help.active").forEach(element => element.classList.remove("active"));
      hideTooltip();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && ruleModalState) {
        closeRuleModal();
      }
    });
    load().catch(error => {
      managerRows = Object.assign([], { error: error.message });
      document.getElementById("editor").innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
      render();
    });
  </script>
</body>
</html>
