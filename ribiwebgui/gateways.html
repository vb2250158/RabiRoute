<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RabiRoute 拉比路由</title>
  <link rel="icon" type="image/png" href="/assets/rabiroute-icon.png" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f2fbff;
      --panel: rgba(255,255,255,.84);
      --panel-strong: #ffffff;
      --ink: #112033;
      --muted: #647386;
      --line: rgba(17,32,51,.12);
      --teal: #19bfc1;
      --teal-dark: #087f91;
      --navy: #0c2a4a;
      --pink: #ff6d9d;
      --amber: #f59e0b;
      --green: #16a34a;
      --red: #dc2626;
      --shadow: 0 18px 48px rgba(12,42,74,.12);
      --topbar-height: 76px;
    }
    html { background: var(--bg); overflow-x: hidden; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Microsoft YaHei UI", system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(25,191,193,.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(12,42,74,.045) 1px, transparent 1px),
        linear-gradient(135deg, #fbfeff 0%, var(--bg) 48%, #fff7fb 100%);
      background-size: 34px 34px, 34px 34px, auto;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      right: clamp(-140px, -7vw, -52px);
      bottom: clamp(-140px, -9vw, -54px);
      width: min(58vw, 620px);
      aspect-ratio: 1;
      background: url("/assets/rabiroute-icon.png") center / contain no-repeat;
      opacity: .13;
      filter: saturate(1.08) drop-shadow(0 28px 64px rgba(25,191,193,.24));
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(115deg, transparent 0 12%, rgba(25,191,193,.08) 12.2% 12.6%, transparent 12.8% 40%, rgba(255,109,157,.08) 40.2% 40.6%, transparent 40.8%),
        linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,.18));
    }
    button, input, select, textarea { font: inherit; }
    button, a.button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.86);
      color: var(--ink);
      padding: 7px 11px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    button:hover, a.button:hover { border-color: rgba(25,191,193,.48); box-shadow: 0 6px 18px rgba(25,191,193,.12); }
    button.primary, a.button.primary { background: linear-gradient(135deg, var(--navy), #16466e); border-color: var(--navy); color: #fff; }
    button.accent { background: linear-gradient(135deg, #35e0d6, #9cf4e8); border-color: rgba(25,191,193,.8); color: #06262d; }
    button.danger { color: var(--red); }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 9px;
      background: rgba(255,255,255,.92);
      color: var(--ink);
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: rgba(25,191,193,.7); box-shadow: 0 0 0 3px rgba(25,191,193,.12); }
    .combo-field { display: grid; gap: 6px; }
    .combo-field .combo-control { display: grid; grid-template-columns: minmax(180px, .72fr) minmax(220px, 1fr); gap: 8px; }
    .combo-field input { font-family: "Cascadia Mono", Consolas, "Microsoft YaHei UI", monospace; font-size: 12px; }
    textarea {
      min-height: 142px;
      resize: vertical;
      line-height: 1.48;
      font-family: "Cascadia Mono", Consolas, "Microsoft YaHei UI", monospace;
      font-size: 12px;
    }
    label { display: grid; gap: 6px; min-width: 0; color: var(--muted); font-size: 12px; font-weight: 700; }
    .app-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr;
      padding-top: var(--topbar-height);
    }
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(255,255,255,.9), rgba(242,251,255,.82)),
        linear-gradient(135deg, rgba(25,191,193,.18), rgba(255,109,157,.08));
      backdrop-filter: blur(18px);
      box-shadow: 0 14px 34px rgba(12,42,74,.12);
    }
    .topbar::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(25,191,193,.72), rgba(255,109,157,.58), transparent);
      pointer-events: none;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand img {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 2px solid rgba(25,191,193,.58);
      box-shadow: 0 10px 28px rgba(25,191,193,.22);
      object-fit: cover;
    }
    .brand-icon-stack { position: relative; width: 46px; height: 46px; flex: 0 0 auto; }
    .brand-icon-stack img { width: 46px; height: 46px; }
    .brand-icon-stack::after {
      content: "";
      position: absolute;
      right: -5px;
      bottom: -5px;
      width: 20px;
      height: 20px;
      background: url("/assets/rabiroute-mini-badge.svg") center / contain no-repeat;
      filter: drop-shadow(0 4px 8px rgba(12,42,74,.16));
    }
    .brand-title { display: grid; gap: 2px; min-width: 0; }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; color: var(--navy); }
    .subtitle { color: var(--muted); font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .health {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--red); box-shadow: 0 0 0 4px rgba(220,38,38,.12); }
    .dot.ok { background: var(--green); box-shadow: 0 0 0 4px rgba(22,163,74,.12); }
    .workspace {
      display: grid;
      grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }
    .sidebar, .main-panel, .side-panel, .section, .plugin-launch {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }
    .sidebar { display: grid; grid-template-rows: auto 1fr; min-height: calc(100vh - 92px); overflow: hidden; }
    .sidebar-head { padding: 14px; border-bottom: 1px solid var(--line); display: grid; gap: 12px; }
    .mascot-card {
      position: relative;
      min-height: 118px;
      overflow: hidden;
      border: 1px solid rgba(25,191,193,.2);
      border-radius: 10px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.88), rgba(235,252,255,.76)),
        linear-gradient(90deg, rgba(25,191,193,.12), rgba(255,109,157,.1));
    }
    .mascot-card::before {
      content: "";
      position: absolute;
      right: -46px;
      bottom: -58px;
      width: 190px;
      height: 190px;
      background: url("/assets/rabiroute-route-glyph.svg") center bottom / contain no-repeat;
      opacity: .42;
      filter: saturate(1.05);
      pointer-events: none;
    }
    .mascot-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,.9) 0 44%, rgba(255,255,255,.48));
      pointer-events: none;
    }
    .mascot-copy {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 5px;
      max-width: 190px;
      padding: 12px;
    }
    .mascot-copy b { color: var(--navy); font-size: 14px; }
    .mascot-copy span { color: var(--muted); font-size: 12px; font-weight: 700; line-height: 1.45; }
    .metric-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .metric {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(255,255,255,.82), rgba(236,252,255,.72));
    }
    .metric b { display: block; font-size: 18px; color: var(--navy); }
    .metric span { color: var(--muted); font-size: 11px; font-weight: 800; }
    .gateway-list { overflow: auto; padding: 10px; display: grid; gap: 8px; align-content: start; }
    .gateway-item {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      text-align: left;
      padding: 11px;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.68);
    }
    .gateway-item.active {
      border-color: rgba(25,191,193,.72);
      background:
        linear-gradient(135deg, rgba(255,255,255,.96), rgba(232,253,255,.9)),
        linear-gradient(90deg, rgba(25,191,193,.2), transparent);
      box-shadow: 0 10px 24px rgba(25,191,193,.14);
    }
    .gateway-name { font-weight: 900; color: var(--navy); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gateway-meta { margin-top: 4px; color: var(--muted); font-size: 12px; font-weight: 700; overflow-wrap: anywhere; }
    .pill {
      align-self: start;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 900;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .pill.running, .pill.enabled { background: rgba(22,163,74,.12); color: var(--green); border-color: rgba(22,163,74,.18); }
    .pill.stopped { background: rgba(220,38,38,.1); color: var(--red); border-color: rgba(220,38,38,.16); }
    .pill.draft { background: rgba(245,158,11,.13); color: #a16207; border-color: rgba(245,158,11,.18); }
    .content { display: grid; grid-template-columns: minmax(0, 1fr) minmax(280px, 360px); gap: 14px; min-width: 0; }
    .main-panel, .side-panel { min-width: 0; padding: 14px; display: grid; gap: 14px; align-content: start; }
    .side-panel { overflow: visible; position: relative; }
    .side-panel::after {
      content: "";
      position: absolute;
      right: -42px;
      top: 74px;
      width: 170px;
      height: 170px;
      background: url("/assets/rabiroute-route-glyph.svg") center / contain no-repeat;
      opacity: .08;
      pointer-events: none;
    }
    .section { position: relative; padding: 16px; box-shadow: none; background: rgba(255,255,255,.74); }
    .section::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 10px 0 0 10px;
      background: linear-gradient(180deg, rgba(25,191,193,.86), rgba(255,109,157,.72));
      opacity: .62;
      pointer-events: none;
    }
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    h2 { margin: 0; font-size: 16px; color: var(--navy); }
    h3 { margin: 0; font-size: 13px; color: var(--navy); }
    .section-note { color: var(--muted); font-size: 12px; font-weight: 700; }
    .config-groups { display: grid; gap: 14px; }
    .config-group {
      display: grid;
      gap: 9px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .config-group:first-child { padding-top: 0; border-top: 0; }
    .config-group-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    .fields { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .field-wide { grid-column: 1 / -1; }
    .route-persona-card {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid rgba(25,191,193,.22);
      border-radius: 10px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.9), rgba(236,252,255,.76)),
        linear-gradient(90deg, rgba(255,109,157,.12), transparent);
      overflow: hidden;
      position: relative;
    }
    .route-persona-card::after {
      content: "";
      position: absolute;
      right: -42px;
      top: -54px;
      width: 180px;
      aspect-ratio: 1;
      background: url("/assets/rabiroute-icon.png") center / contain no-repeat;
      opacity: .08;
      pointer-events: none;
    }
    .route-avatar {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      padding: 5px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.82), rgba(255,255,255,.42)),
        linear-gradient(135deg, rgba(25,191,193,.86), rgba(255,109,157,.62));
      box-shadow: 0 14px 28px rgba(25,191,193,.18);
    }
    .route-avatar img { width: 100%; height: 100%; display: block; border-radius: 12px; object-fit: cover; background: #fff; }
    .route-avatar.persona-mark { background: linear-gradient(135deg, rgba(25,191,193,.92), rgba(255,109,157,.7)); }
    .route-avatar.persona-mark img { object-fit: contain; padding: 0; }
    .route-persona-fields { position: relative; z-index: 1; }
    .persona-layout {
      display: grid;
      grid-template-columns: minmax(260px, .88fr) minmax(320px, 1.12fr);
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }
    .persona-info-card,
    .persona-preview-card,
    .message-rule-head {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.78);
    }
    .persona-info-card {
      display: grid;
      gap: 10px;
      padding: 12px;
      background:
        linear-gradient(135deg, rgba(236,252,255,.82), rgba(255,247,251,.68)),
        rgba(255,255,255,.82);
    }
    .persona-info-top {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }
    .persona-info-top .route-avatar { width: 56px; height: 56px; border-radius: 14px; }
    .persona-path-list { display: grid; gap: 7px; }
    .persona-path {
      display: grid;
      gap: 2px;
      padding: 8px;
      border: 1px solid rgba(17,32,51,.1);
      border-radius: 8px;
      background: rgba(255,255,255,.7);
      overflow-wrap: anywhere;
    }
    .persona-path b { color: var(--navy); font-size: 12px; }
    .persona-path span { color: var(--muted); font-size: 12px; font-weight: 700; }
    .persona-preview-card { overflow: hidden; }
    .persona-preview-card .config-group-head { padding: 10px 12px; border-bottom: 1px solid var(--line); background: rgba(7,24,39,.035); }
    .persona-preview-card .route-extension-content { padding: 10px 12px 12px; }
    .message-rule-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 12px;
      margin-top: 12px;
      background:
        linear-gradient(90deg, rgba(25,191,193,.1), rgba(255,255,255,.82), rgba(255,109,157,.08));
    }
    .message-rule-title { display: grid; gap: 2px; }
    .message-rule-count {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(12,42,74,.08);
      color: var(--navy);
      font-size: 12px;
      font-weight: 900;
    }
    .inline-check { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); font-weight: 800; }
    .inline-check input { width: auto; }
    .rule-list { display: grid; gap: 12px; }
    .rule-overview-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.86);
      text-align: left;
    }
    .rule-overview-card:hover { border-color: rgba(25,191,193,.5); box-shadow: 0 8px 22px rgba(25,191,193,.1); }
    .rule-overview-main { display: grid; gap: 6px; min-width: 0; }
    .rule-overview-title { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
    .rule-overview-title strong { color: var(--navy); font-size: 13px; }
    .rule-overview-meta { display: flex; flex-wrap: wrap; gap: 6px; color: var(--muted); font-size: 12px; font-weight: 800; }
    .rule-chip {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      border-radius: 999px;
      padding: 3px 7px;
      background: rgba(7,24,39,.06);
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }
    .rule-overview-snippet {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rule-overview-action { color: var(--teal-dark); font-size: 12px; font-weight: 900; }
    .role-rule-group {
      display: grid;
      gap: 8px;
    }
    .role-rule-head {
      display: grid;
      grid-template-columns: minmax(180px, 260px) 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(7,24,39,.04);
      color: var(--navy);
      font-size: 13px;
      font-weight: 900;
    }
    .role-rule-head label { color: var(--muted); }
    .rule-card {
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(255,255,255,.94);
      overflow: hidden;
    }
    .rule-title-stack { display: grid; gap: 5px; min-width: 0; }
    .rule-id {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      border-radius: 999px;
      padding: 3px 7px;
      background: rgba(7,24,39,.06);
      color: var(--muted);
      font-family: "Cascadia Mono", Consolas, monospace;
      font-size: 11px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }
    .rule-top {
      display: grid;
      grid-template-columns: minmax(170px, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(25,191,193,.11), rgba(255,255,255,.82), rgba(255,109,157,.08));
    }
    .rule-body { display: grid; grid-template-columns: minmax(230px, 290px) minmax(0, 1fr); gap: 12px; padding: 12px; }
    .rule-tools {
      display: grid;
      gap: 7px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(238,248,251,.78), rgba(255,247,251,.58));
      align-content: start;
    }
    .rule-note { align-self: center; }
    .template-editor textarea {
      min-height: 240px;
      max-height: 520px;
      overflow: auto;
      white-space: pre-wrap;
    }
    .route-kind-box {
      display: grid;
      gap: 7px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.7);
    }
    .route-kind-box label { display: flex; align-items: center; gap: 6px; color: var(--ink); font-size: 12px; font-weight: 700; }
    .route-kind-box input { width: auto; }
    .route-source-list { display: grid; gap: 8px; }
    .route-source-card {
      display: grid;
      gap: 8px;
      padding: 9px;
      border: 1px solid rgba(25,191,193,.22);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.86), rgba(236,252,255,.58)),
        linear-gradient(90deg, rgba(25,191,193,.08), rgba(255,109,157,.06));
    }
    .route-source-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: baseline;
      color: var(--navy);
      font-size: 12px;
      font-weight: 950;
    }
    .route-source-head span:last-child {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-align: right;
    }
    .route-kind-group {
      display: grid;
      gap: 6px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.72);
    }
    .route-kind-group-title {
      color: var(--muted);
      font-size: 11px;
      font-weight: 950;
    }
    .route-kind-chip-list { display: grid; gap: 6px; }
    .route-kind-chip-list label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
    }
    .route-kind-chip-list input { width: auto; }
    .route-group-filter {
      padding-top: 6px;
      border-top: 1px dashed rgba(31,45,61,.14);
    }
    .route-filter-card {
      display: grid;
      gap: 7px;
      padding: 9px;
      border: 1px solid rgba(255,109,157,.2);
      border-radius: 8px;
      background: rgba(255,247,251,.68);
    }
    .adapter-list { grid-column: 1 / -1; display: grid; gap: 9px; }
    .adapter-choice-grid {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 9px;
    }
    .message-source-panel {
      display: grid;
      grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
      gap: 12px;
      grid-column: 1 / -1;
      align-items: start;
    }
    .message-source-list { display: grid; gap: 8px; }
    .message-source-list .adapter-choice-grid { grid-template-columns: 1fr; }
    .adapter-choice {
      position: relative;
      display: grid;
      gap: 5px;
      min-height: 92px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.72);
      color: var(--ink);
      text-align: left;
      align-content: start;
    }
    .adapter-choice:hover { border-color: rgba(25,191,193,.48); box-shadow: 0 8px 20px rgba(25,191,193,.1); }
    .adapter-choice.active {
      border-color: rgba(25,191,193,.72);
      background:
        linear-gradient(135deg, rgba(236,252,255,.92), rgba(255,255,255,.86)),
        linear-gradient(90deg, rgba(25,191,193,.14), rgba(255,109,157,.08));
    }
    .adapter-choice strong { color: var(--navy); font-size: 13px; }
    .adapter-choice span { color: var(--muted); font-size: 12px; font-weight: 700; line-height: 1.35; }
    .adapter-choice::after {
      content: "";
      position: absolute;
      right: 10px;
      top: 10px;
      width: 17px;
      height: 17px;
      border: 1px solid rgba(17,32,51,.18);
      border-radius: 50%;
      background: rgba(255,255,255,.86);
    }
    .adapter-choice.active::after {
      border-color: rgba(25,191,193,.9);
      background:
        radial-gradient(circle at center, var(--teal) 0 42%, transparent 46%),
        #fff;
    }
    .message-source-fields {
      display: grid;
      gap: 10px;
      min-width: 0;
    }
    .message-source-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.78);
    }
    .message-source-summary strong { color: var(--navy); font-size: 13px; }
    .message-source-summary span { color: var(--muted); font-size: 12px; font-weight: 800; }
    .adapter-row {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 8px;
      align-items: end;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.78);
    }
    .adapter-fieldset {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(25,191,193,.18);
      border-radius: 8px;
      background: rgba(236,252,255,.46);
    }
    .adapter-fieldset .section-note,
    .adapter-fieldset .field-wide { grid-column: 1 / -1; }
    .route-extension {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.7);
      overflow: hidden;
    }
    .route-extension summary {
      padding: 8px;
      color: var(--ink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 900;
    }
    .route-extension-content {
      display: grid;
      gap: 8px;
      padding: 0 8px 8px;
    }
    .variable-list { display: grid; gap: 8px; }
    .variable-row { display: grid; grid-template-columns: minmax(150px, 220px) minmax(180px, 1fr) auto; gap: 8px; align-items: end; }
    .template-vars {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 7px;
      color: var(--muted);
      font-size: 11px;
    }
    .template-var {
      display: grid;
      gap: 3px;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.7);
    }
    .template-var code { color: var(--navy); font-weight: 900; }
    .template-var span { line-height: 1.35; }
    pre {
      margin: 0;
      min-height: 190px;
      max-height: 330px;
      overflow: auto;
      padding: 12px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(25,191,193,.08), transparent),
        #071827;
      color: #d7f8ff;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .empty {
      padding: 28px;
      border: 1px dashed rgba(17,32,51,.2);
      border-radius: 10px;
      background: rgba(255,255,255,.55);
      color: var(--muted);
      font-weight: 800;
      text-align: center;
    }
    .plugin-launch { padding: 12px; display: grid; gap: 8px; background: rgba(255,255,255,.72); }
    .plugin-launch p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .label-row { display: flex; align-items: center; gap: 6px; min-height: 18px; }
    .help {
      display: inline-grid;
      place-items: center;
      width: 17px;
      height: 17px;
      border-radius: 50%;
      border: 1px solid rgba(17,32,51,.18);
      background: #fff;
      color: var(--teal-dark);
      font-size: 12px;
      font-weight: 900;
      cursor: help;
      user-select: none;
    }
    #tooltip {
      position: fixed;
      left: 0;
      top: 0;
      width: min(340px, calc(100vw - 24px));
      padding: 9px 10px;
      border-radius: 8px;
      background: #071827;
      color: #fff;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      box-shadow: 0 12px 30px rgba(7,24,39,.24);
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transform: translate3d(-9999px, -9999px, 0);
    }
    #tooltip.visible { opacity: 1; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(7,24,39,.42);
      backdrop-filter: blur(8px);
    }
    .modal {
      width: min(1120px, calc(100vw - 36px));
      max-height: calc(100vh - 36px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border: 1px solid rgba(255,255,255,.38);
      border-radius: 10px;
      background: rgba(250,253,255,.96);
      box-shadow: 0 28px 90px rgba(7,24,39,.34);
      overflow: hidden;
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(236,252,255,.9), rgba(255,247,251,.86));
    }
    .modal-head h2 { font-size: 16px; }
    .modal-body {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(210px, 280px) minmax(0, 1fr);
      gap: 12px;
      padding: 12px;
      overflow: auto;
    }
    .rule-tabs {
      display: grid;
      gap: 8px;
      align-content: start;
    }
    .rule-tab {
      width: 100%;
      justify-content: flex-start;
      text-align: left;
      border-radius: 8px;
      background: rgba(255,255,255,.82);
    }
    .rule-tab.active {
      border-color: rgba(25,191,193,.7);
      background: rgba(236,252,255,.88);
    }
    .rule-editor-pane { min-width: 0; }
    .rule-editor-pane .rule-card { height: 100%; }
    .rule-editor-pane .rule-body { grid-template-columns: minmax(230px, 300px) minmax(0, 1fr); }
    @media (max-width: 1100px) {
      .workspace, .content { grid-template-columns: 1fr; }
      .sidebar { min-height: auto; }
      .side-panel { position: static; max-height: none; }
      .persona-layout { grid-template-columns: 1fr; }
      .message-source-panel { grid-template-columns: 1fr; }
      .modal-body { grid-template-columns: 1fr; }
      .rule-tabs { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    }
    @media (max-width: 760px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .top-actions { width: 100%; justify-content: flex-start; }
      .fields, .rule-top, .rule-body, .route-persona-card, .combo-field .combo-control { grid-template-columns: 1fr; }
      .route-avatar { display: none; }
      .workspace { padding: 10px; }
      body::before { opacity: .08; width: 92vw; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon-stack"><img src="/assets/rabiroute-icon.png" alt="RabiRoute" /></div>
        <div class="brand-title">
          <h1>RabiRoute</h1>
          <div class="subtitle">消息入口、规则路由、Agent 连接</div>
        </div>
      </div>
      <div class="top-actions">
        <div id="manager-health" class="health"><span class="dot"></span><span>加载中</span></div>
        <button id="refresh">刷新</button>
        <button id="start-manager">启动 Manager</button>
        <button id="add">新增路由配置</button>
        <button id="open-manager-config">打开路由配置目录</button>
        <button id="save" class="primary">保存配置</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div id="plugin-launch" class="plugin-launch" hidden>
            <b>独立控制台</b>
            <p>当前在 NapCat 插件壳内，可跳转到本地控制台。</p>
            <a id="standalone-link" class="button primary" href="http://127.0.0.1:8790/" target="_blank" rel="noreferrer">打开 RabiRoute</a>
          </div>
          <div class="metric-row">
            <div class="metric"><b id="metric-total">0</b><span>路由配置</span></div>
            <div class="metric"><b id="metric-running">0</b><span>Running</span></div>
          </div>
          <div class="mascot-card">
            <div class="mascot-copy">
              <b>Rabi Online</b>
              <span>Route · Persona · Agent</span>
            </div>
          </div>
        </div>
        <div id="gateway-list" class="gateway-list"></div>
      </aside>

      <div class="content">
        <section id="editor" class="main-panel"></section>
        <aside id="runtime-panel" class="side-panel"></aside>
      </div>
    </main>
  </div>
  <div id="tooltip"></div>
  <div id="modal-root"></div>

  <script>
    const pluginApiBase = "/plugin/napcat-plugin-rabiroute/api";
    const isPluginShell = location.pathname.startsWith("/plugin/");
    const apiBase = isPluginShell ? pluginApiBase : "";
    const routeKindLabels = {
      direct_at: "群聊-直接 @",
      direct_reply: "群聊-直接回复",
      indirect_reply: "群聊-间接回复",
      group_message: "群聊-普通消息",
      private: "私聊",
      heartbeat: "定时触发",
      voice_transcript: "语音转写"
    };
    const templateVars = [
      { name: "routeKind", description: "当前命中的路由类型，例如 direct_at、private、group_message、heartbeat、voice_transcript。" },
      { name: "RobotQQId", description: "机器人 QQ 号，来自当前消息事件 self_id。" },
      { name: "SenderQQId", description: "发送者 QQ 号。" },
      { name: "GroupId", description: "群号；私聊时为空。" },
      { name: "ReplyMessageId", description: "被回复消息 ID；非回复消息时为空。" },
      { name: "time", description: "消息时间，已格式化为本地时间。" },
      { name: "now", description: "模板渲染时的当前本地时间，等同 currentTime。" },
      { name: "currentTime", description: "模板渲染时的当前本地时间。" },
      { name: "currentDate", description: "当前日期，格式 YYYY-MM-DD。" },
      { name: "currentClock", description: "当前时分秒，格式 HH:mm:ss。" },
      { name: "currentIsoTime", description: "当前 ISO 时间字符串。" },
      { name: "currentTimestamp", description: "当前 Unix 时间戳，单位秒。" },
      { name: "currentYear", description: "当前年份。" },
      { name: "currentMonth", description: "当前月份，补零为两位。" },
      { name: "currentDay", description: "当前日期中的日，补零为两位。" },
      { name: "currentWeekday", description: "当前星期，例如 星期四。" },
      { name: "currentHour", description: "当前小时，补零为两位。" },
      { name: "currentMinute", description: "当前分钟，补零为两位。" },
      { name: "currentSecond", description: "当前秒数，补零为两位。" },
      { name: "messageTarget", description: "目标会话描述，例如群号或私聊对象。" },
      { name: "groupId", description: "群消息的群号；私聊时不填充。" },
      { name: "userId", description: "发送者 QQ 号。" },
      { name: "sender", description: "发送者显示名，优先使用群名片或昵称。" },
      { name: "message", description: "原始消息文本，包含 CQ 码。" },
      { name: "routeText", description: "用于路由匹配的消息文本，@ 和回复 CQ 码会转成更易匹配的文本。" },
      { name: "repliedRouteText", description: "被回复消息对应的路由匹配文本。" },
      { name: "repliedMessage", description: "被回复消息的原始文本。" },
      { name: "routeProfileId", description: "当前命中的 route profile ID。" },
      { name: "routeProfileName", description: "当前命中的 route profile 名称。" },
      { name: "agentRoleId", description: "当前选择的路由人格 ID。" },
      { name: "agentRolePath", description: "当前路由人格文件路径。" },
      { name: "agentRoleDir", description: "当前路由人格的数据目录。" },
      { name: "groupLogPath", description: "群聊消息 JSONL 记录路径。" },
      { name: "privateLogPath", description: "私聊消息 JSONL 记录路径。" },
      { name: "heartbeatLogPath", description: "定时触发事件 JSONL 记录路径。" },
      { name: "heartbeatIntervalSeconds", description: "定时触发间隔，单位秒。" },
      { name: "voiceTranscriptLogPath", description: "语音转写 JSONL 记录路径。" },
      { name: "voiceSource", description: "Webhook 来源。" },
      { name: "voiceDurationSeconds", description: "语音片段时长，单位秒。" },
      { name: "voicePeak", description: "语音片段峰值音量。" }
    ];
    let state = { gateways: [] };
    let managerRows = [];
    let networkOptions = { adapters: {}, httpServers: [], websocketClients: [] };
    let configFiles = {};
    let selectedGatewayId = "";
    let ruleModalState = null;

    function gatewayRuntime(id) {
      return managerRows.find(row => row.id === id) || {};
    }

    function renderReasonList(reasons) {
      if (!reasons.length) return "";
      return `
        <div class="section-note" style="margin-top:9px;color:var(--red);overflow-wrap:anywhere">
          ${reasons.map(reason => `<div>原因：${escapeHtml(reason)}</div>`).join("")}
        </div>
      `;
    }

    function adapterConnectionReasons(gateway, runtime, adapterTypes, napcatState, heartbeatState, adapterPendingRestart, runtimeAdapterTypes) {
      const reasons = [];
      if (!runtime.running) {
        reasons.push("Gateway 进程未运行。");
      }
      if (adapterPendingRestart) {
        reasons.push(`配置已变更但尚未重启：当前运行 ${runtimeAdapterTypes.map(adapterLabel).join(" + ")}，保存并重启后切换到 ${adapterTypes.map(adapterLabel).join(" + ")}。`);
      }
      if (adapterTypes.includes("napcat")) {
        const wsUrl = `ws://127.0.0.1:${gateway.gatewayPort || runtime.gatewayPort || "-"}`;
        const httpUrl = gateway.napcatHttpUrl || runtime.napcatHttpUrl || "-";
        if (!napcatState.connected) {
          reasons.push(napcatState.lastDisconnectedAt
            ? `NapCat WebSocket 当前未连接；最后断开时间：${napcatState.lastDisconnectedAt}。请检查 NapCat WebSocket Client 是否启用并连接到 ${wsUrl}。`
            : `NapCat WebSocket 尚未连接。请在 NapCat OneBot 网络配置中启用 WebSocket Client，并连接到 ${wsUrl}。`);
        }
        if (napcatState.loginInfoError) {
          reasons.push(`NapCat HTTP 不可用或登录资料读取失败：${napcatState.loginInfoError}。当前 HTTP 地址：${httpUrl}。`);
        }
      }
      if (adapterTypes.includes("heartbeat") && heartbeatState.enabled === false) {
        reasons.push("定时触发消息端未启用。");
      }
      return reasons;
    }

    function explainAgentError(error) {
      const text = String(error || "");
      if (!text) return "";
      if (text.includes("no-client-found")) {
        return "Codex Desktop IPC 没有找到可用客户端。请确认 Codex Desktop 正在运行，并且目标线程可被当前 Desktop 会话接收。";
      }
      if (text.includes("thread not found")) {
        return "Codex 线程 ID 已失效。请在 RibiWebGUI 中重新绑定或让 manager 重新发现目标线程。";
      }
      return text;
    }

    function agentConnectionReasons(gateway, agentState, agentError) {
      const reasons = [];
      if (!agentState.monitorThreadId) {
        reasons.push(agentState.message || `尚未绑定 Agent 会话。请确认 Codex Desktop 中存在名为“${gateway.codexThreadName || gateway.name || gateway.id}”的线程。`);
      }
      if (agentError) {
        reasons.push(explainAgentError(agentError));
      }
      return reasons;
    }

    function selectedIndex() {
      const index = state.gateways.findIndex(gateway => gateway.id === selectedGatewayId);
      return index >= 0 ? index : 0;
    }

    function render() {
      document.getElementById("plugin-launch").hidden = !isPluginShell;
      if (!selectedGatewayId && state.gateways[0]) {
        selectedGatewayId = state.gateways[0].id;
      }
      if (selectedGatewayId && !state.gateways.some(gateway => gateway.id === selectedGatewayId)) {
        selectedGatewayId = state.gateways[0]?.id || "";
      }

      const managerError = managerRows.error;
      const runningCount = state.gateways.filter(gateway => gatewayRuntime(gateway.id).running).length;
      document.getElementById("metric-total").textContent = String(state.gateways.length);
      document.getElementById("metric-running").textContent = String(runningCount);
      document.getElementById("manager-health").innerHTML = managerError
        ? `<span class="dot"></span><span>Manager 未连接</span>`
        : `<span class="dot ok"></span><span>Manager 已连接</span>`;

      renderGatewayList();
      renderEditor();
      renderRuntimePanel();
      renderRuleModal();
      bindInputs();
    }

    function renderGatewayList() {
      const list = document.getElementById("gateway-list");
      if (state.gateways.length === 0) {
        list.innerHTML = `<div class="empty">暂无路由配置</div>`;
        return;
      }

      list.innerHTML = state.gateways.map(gateway => {
        const runtime = gatewayRuntime(gateway.id);
        const runningClass = runtime.running ? "running" : "stopped";
        const runningText = runtime.running ? "运行中" : "已停止";
        const activeClass = gateway.id === selectedGatewayId ? "active" : "";
        const title = configNameFor(gateway);
        const webhookMeta = gatewayAdapterTypes(gateway).includes("webhook") && (gateway.webhookPort || gateway.gatewayPort)
          ? `webhook:${gateway.webhookPort || gateway.gatewayPort}${gateway.webhookPath || "/webhook"}`
          : "";
        const metaParts = [
          gateway.agentRoleId ? `人格 ${gateway.agentRoleId}` : "未指向人格",
          `配置 ${configNameFor(gateway)}`,
          gateway.gatewayPort ? `:${gateway.gatewayPort}` : "",
          webhookMeta
        ].filter(Boolean);
        return `
          <button class="gateway-item ${activeClass}" data-select-gateway="${escapeAttr(gateway.id)}">
            <span>
              <span class="gateway-name">${escapeHtml(title)}</span>
              <span class="gateway-meta">${escapeHtml(metaParts.join(" · "))}</span>
            </span>
            <span class="pill ${runningClass}">${runningText}</span>
          </button>
        `;
      }).join("");
    }

    function renderEditor() {
      const editor = document.getElementById("editor");
      const index = selectedIndex();
      const gateway = state.gateways[index];
      if (!gateway) {
        editor.innerHTML = `<div class="empty">选择或新增一个路由配置</div>`;
        return;
      }

      const rules = notificationRulesForGateway(gateway);
      const title = configNameFor(gateway);
      const runtime = gatewayRuntime(gateway.id);
      const roleInfo = runtime.roleInfo || {};
      const routesPath = routeConfigPathFor(gateway);
      const routeFolderName = gateway.configName || configNameFor(gateway) || "未命名配置";
      const personaSection = gateway.agentRoleId ? `
        <section class="section">
          <div class="section-head">
            <div>
              <h2>人格配置</h2>
              <div class="section-note">当前路由指向 ${escapeHtml(gateway.agentRoleId)}，消息包装、模板规则和人格信息都跟随这个角色</div>
            </div>
            <div class="top-actions" style="justify-content:flex-end">
              <button type="button" onclick="openConfigFile('role', '${escapeAttr(gateway.id)}', '${escapeAttr(gateway.agentRoleId || "")}')">打开人格配置</button>
              <button type="button" onclick="openConfigFile('role-message-config', '${escapeAttr(gateway.id)}', '${escapeAttr(gateway.agentRoleId || "")}')">打开消息模板配置</button>
              <button type="button" class="accent" onclick="addNotificationRule(${index})">新增规则</button>
            </div>
          </div>
          <div class="persona-layout">
            <div class="persona-info-card">
              <div class="persona-info-top">
                <div class="route-avatar persona-mark"><img src="/assets/rabiroute-persona-mark.svg" alt="Rabi persona" /></div>
                <div>
                  <h3>${escapeHtml(gateway.agentRoleId)}</h3>
                  <div class="section-note">人格文件与消息包装规则</div>
                </div>
              </div>
              <div class="persona-path-list">
                <div class="persona-path">
                  <b>角色文件夹</b>
                  <span>./data/roles/${escapeHtml(gateway.agentRoleId)}</span>
                </div>
                <div class="persona-path">
                  <b>人格配置</b>
                  <span>./data/roles/${escapeHtml(gateway.agentRoleId)}/persona.md</span>
                </div>
                <div class="persona-path">
                  <b>消息模板配置</b>
                  <span>./data/roles/${escapeHtml(gateway.agentRoleId)}/roleMessageConfig.json</span>
                </div>
              </div>
            </div>
            <div class="persona-preview-card">
              <div class="config-group-head">
                <h3>人格文件预览</h3>
                <span class="section-note">persona.md</span>
              </div>
              <div class="route-extension-content">
                ${renderRolePreview(gateway, gateway.agentRoleId || "")}
              </div>
            </div>
          </div>

      editor.innerHTML = `
        <section class="section">
          <div class="section-head">
            <div>
              <h2>路由配置</h2>
              <div class="section-note">${escapeHtml(title)} · 接口参数</div>

          <div class="config-groups">
            <div class="config-group">

              </div>
              <div class="section-note" style="margin-top:7px;overflow-wrap:anywhere">路由目录：${escapeHtml(configFiles.routeRoot || configFiles.manager || "data/route")}</div>
              <div class="section-note" style="margin-top:5px;overflow-wrap:anywhere">角色目录：${escapeHtml(roleInfo.rolesDir || gateway.rolesDir || "./data/roles")}</div>
